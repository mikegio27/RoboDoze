services:
  robodoze:
    build: .
    env_file: .env
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/readyz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
